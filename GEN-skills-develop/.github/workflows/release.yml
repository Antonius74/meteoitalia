name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.10.0

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run prepare

      - name: Configure Artifactory npm auth
        env:
          NPM_TOKEN: ${{ secrets.ARTIFACTORY_NPM_TOKEN }}
        run: |
          test -n "$NPM_TOKEN"
          {
            echo "@nexidigital:registry=https://artifactory.nexicloud.it/artifactory/api/npm/libs-nexidigital-local"
            echo "//artifactory.nexicloud.it/artifactory/api/npm/libs-nexidigital-local/:_authToken=\${NPM_TOKEN}"
          } > "$RUNNER_TEMP/npmrc"

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.ARTIFACTORY_NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.ARTIFACTORY_NPM_TOKEN }}
          NPM_CONFIG_USERCONFIG: ${{ runner.temp }}/npmrc
        run: npm run release
